<script>
document.addEventListener('DOMContentLoaded', function () {
  // DEBUG: log child elements of each section so we can find the right selectors
  ['accomplishments', 'experience', 'proexperience', 'proService'].forEach(function (id) {
    var sec = document.getElementById(id) || document.getElementById(id.toLowerCase());
    if (!sec) { console.log('DEBUG ' + id + ': section not found'); return; }
    var children = Array.from(sec.querySelectorAll('li, .col-12, .col-12.d-flex, .experience-row, .experience-card, .card'));
    console.log('DEBUG ' + id + ':', {
      li: sec.querySelectorAll('li').length,
      'col-12': sec.querySelectorAll('.col-12').length,
      'col-12.d-flex': sec.querySelectorAll('.col-12.d-flex').length,
      'col-12.col-md-12': sec.querySelectorAll('.col-12.col-md-12').length,
      'experience-row': sec.querySelectorAll('.experience-row').length,
      'experience-card': sec.querySelectorAll('.experience-card').length,
      card: sec.querySelectorAll('.card').length,
    });
  });

  function collapseSection(sectionId, selectors, threshold) {
    try {
      var section = document.getElementById(sectionId) ||
                    document.getElementById(sectionId.toLowerCase());
      if (!section) return;

      var items = [];
      for (var i = 0; i < selectors.length; i++) {
        var found = Array.from(section.querySelectorAll(selectors[i]));
        if (found.length > 0) { items = found; break; }
      }
      if (items.length <= threshold) return;

      var hiddenItems = items.slice(threshold);
      hiddenItems.forEach(function (el) { el.style.display = 'none'; });

      var remaining = items.length - threshold;
      var btn = document.createElement('button');
      btn.textContent = 'Show ' + remaining + ' more ▾';
      btn.className = 'btn btn-outline-primary btn-sm mt-3';

      var expanded = false;
      btn.addEventListener('click', function () {
        expanded = !expanded;
        hiddenItems.forEach(function (el) { el.style.display = expanded ? '' : 'none'; });
        btn.textContent = expanded
          ? 'Show less ▴'
          : 'Show ' + remaining + ' more ▾';
      });

      var parent = items[0].closest('ul') || items[0].closest('.row') || items[0].parentNode;
      parent.insertAdjacentElement('afterend', btn);
    } catch (e) {
      console.warn('collapseSection(' + sectionId + '):', e);
    }
  }

  collapseSection('accomplishments', ['li', '.col-12.col-md-12', '.experience-item', '.card'], 3);
  collapseSection('experience',    ['.experience-row', '.col-12.d-flex', '.experience-card'], 3);
  collapseSection('proexperience', ['.experience-row', '.col-12.d-flex', '.experience-card'], 3);
  collapseSection('proService',    ['.experience-row', '.col-12.d-flex', '.experience-card'], 3);
  collapseSection('publications',  ['.pub-list-item', 'li', '.col-12'], 3);
});
</script>
