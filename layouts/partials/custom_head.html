<script>
document.addEventListener('DOMContentLoaded', function () {
  function collapseSection(sectionId, selectors, threshold) {
    try {
      var section = document.getElementById(sectionId) ||
                    document.getElementById(sectionId.toLowerCase());
      if (!section) return;

      var items = [];
      for (var i = 0; i < selectors.length; i++) {
        var found = Array.from(section.querySelectorAll(selectors[i]));
        if (found.length > 0) { items = found; break; }
      }
      if (items.length <= threshold) return;

      var hiddenItems = items.slice(threshold);
      hiddenItems.forEach(function (el) { el.style.display = 'none'; });

      var remaining = items.length - threshold;
      var btn = document.createElement('button');
      btn.textContent = 'Show ' + remaining + ' more ▾';
      btn.className = 'btn btn-outline-primary btn-sm mt-3';

      var expanded = false;
      btn.addEventListener('click', function () {
        expanded = !expanded;
        hiddenItems.forEach(function (el) { el.style.display = expanded ? '' : 'none'; });
        btn.textContent = expanded
          ? 'Show less ▴'
          : 'Show ' + remaining + ' more ▾';
      });

      // Insert button right after the last visible item
      items[threshold - 1].insertAdjacentElement('afterend', btn);
    } catch (e) {
      console.warn('collapseSection(' + sectionId + '):', e);
    }
  }

  // Accomplishments: each item is <div class="card experience course">
  collapseSection('accomplishments', ['.card.experience.course'], 3);

  // Experience widgets: each entry is <div class="row experience">
  collapseSection('experience',    ['.row.experience'], 3);
  collapseSection('proexperience', ['.row.experience'], 3);
  collapseSection('proService',    ['.row.experience'], 3);

  // Publications
  collapseSection('publications', ['.pub-list-item', 'li', '.col-12'], 3);

  // Wireless signal pulse animation behind Biography
  var about = document.getElementById('about');
  if (about) {
    var bg = document.createElement('div');
    bg.className = 'wireless-bg';
    bg.innerHTML = '<span></span><span></span><span></span>';
    about.insertBefore(bg, about.firstChild);
  }
});
</script>
